<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research — Ergodic Research Group (ERG)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f6f2e9;   
            --text-main: #1c1c1c;   
            --text-muted: #555555;    
            --text-light: #767676;    
            --border-color: #e5dfd3;  
            --card-bg: #faf7f2;        
            --accent-hover: #000000;
            --tag-bg: #eae3d5;          
        }

        html { scroll-behavior: smooth; }
        *{ margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-main);
            background-color: var(--bg-color);
            line-height: 1.7;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Noise Filter */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            opacity: 0.02;
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* --- STABLE CANVAS LAYERS --- */
        .ghost-canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        #ghostCanvas { width: 100%; height: 100%; display: block; }
        .shoreline-canvas-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 240px; z-index: 10; pointer-events: none; }
        #shorelineCanvas { width: 100%; height: 100%; display: block; }

        /* ... Existing Styles (Keep your header, nav, projects, etc. here) ... */
        header.site-header { position: sticky; top: 0; z-index: 100; background-color: rgba(246, 242, 233, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); }
        nav { max-width: 1150px; margin: auto; padding: 24px 30px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-weight: 600; font-size: 1.05rem; }
        .brand-sub { font-weight: 400; color: var(--text-light); margin-left: 6px; }
        nav ul { display: flex; list-style: none; gap: 32px; font-size: 0.92rem; }
        .page-header { max-width: 1150px; margin: 80px auto 40px auto; padding: 0 30px; }
        .projects-container { max-width: 1150px; margin: 0 auto 100px auto; padding: 0 30px; display: flex; flex-direction: column; gap: 32px; }
        .project-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 40px; transition: transform 0.3s ease; }
        .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.8s, transform 0.8s; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

<header class="site-header">
    <nav>
        <div class="brand">Ergodic Research Group<span class="brand-sub">ERG</span></div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="research.html" class="active">Research</a></li>
            <li><a href="software.html">Software</a></li>
        </ul>
    </nav>
</header>

<main style="position: relative; z-index: 5;">
    <header class="page-header reveal">
        <h1>Active Research</h1>
        <p>Long-term core initiatives and interdisciplinary technical tracks.</p>
    </header>

    <div class="projects-container">
        <article class="project-card reveal">
            <h2>ARCUS-X</h2>
            <p>Evaluating sequential transformation in LLMs.</p>
        </article>
    </div>
</main>

<!-- Wave Canvas Containers -->
<div class="ghost-canvas-container"><canvas id="ghostCanvas"></canvas></div>
<div class="shoreline-canvas-container"><canvas id="shorelineCanvas"></canvas></div>

<script>
    // Integration of your scroll/animation logic
    document.addEventListener("DOMContentLoaded", () => {
        // Reveal Logic
        const revealElements = document.querySelectorAll(".reveal");
        const revealOnScroll = () => {
            revealElements.forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 40) el.classList.add("active");
            });
        };
        window.addEventListener("scroll", revealOnScroll);
        revealOnScroll();

        // Wave Logic
        const sCanvas = document.getElementById("shorelineCanvas");
        const sCtx = sCanvas.getContext("2d");
        const gCanvas = document.getElementById("ghostCanvas");
        const gCtx = gCanvas.getContext("2d");

        let viewWidth = window.innerWidth;
        const viewHeight = 240;
        
        function resizeCanvases() {
            const dpr = window.devicePixelRatio || 1;
            viewWidth = window.innerWidth;
            sCanvas.width = viewWidth * dpr;
            sCanvas.height = viewHeight * dpr;
            sCtx.scale(dpr, dpr);
            gCanvas.width = viewWidth * dpr;
            gCanvas.height = document.documentElement.scrollHeight * dpr;
            gCtx.scale(dpr, dpr);
        }
        
        window.addEventListener('resize', resizeCanvases);
        resizeCanvases();

        let waveOffsetFront = 0, waveOffsetBack = 0;
        let lastScrollY = window.scrollY, isScrollingDown = false, ghostAlpha = 0;
        let stopTime = 0, scrollTimeout, hasAnchor = false, scrollStartTopY = 0, scrollStartWaveOffset = 0;

        window.addEventListener('scroll', () => {
            if (window.scrollY > lastScrollY) {
                if (!isScrollingDown) {
                    isScrollingDown = true; stopTime = 0; ghostAlpha = 0.18;
                    if (!hasAnchor) { scrollStartTopY = lastScrollY; scrollStartWaveOffset = waveOffsetFront; hasAnchor = true; }
                }
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => { isScrollingDown = false; stopTime = performance.now(); }, 120);
            }
            lastScrollY = window.scrollY;
        });

        function renderLoop(timestamp) {
            sCtx.clearRect(0, 0, viewWidth, viewHeight);
            waveOffsetFront += 0.018; waveOffsetBack += 0.009;

            if (!isScrollingDown && stopTime > 0) {
                const elapsed = timestamp - stopTime;
                if (elapsed < 3000) ghostAlpha = 0.18 * (1 - (elapsed / 3000));
                else { ghostAlpha = 0; stopTime = 0; hasAnchor = false; }
            }

            let currentWaveY = [];
            for (let x = 0; x < viewWidth; x++) currentWaveY[x] = 185 + Math.sin(x * 0.006 + waveOffsetFront) * 12;

            if (hasAnchor && ghostAlpha > 0) {
                gCtx.clearRect(0, 0, viewWidth, gCanvas.height);
                gCtx.save(); gCtx.filter = 'blur(6px)'; gCtx.fillStyle = `rgba(0,0,0,${ghostAlpha})`; gCtx.beginPath();
                const startY = scrollStartTopY + window.innerHeight - viewHeight;
                for (let x = 0; x < viewWidth; x++) gCtx.lineTo(x, startY + 185 + Math.sin(x * 0.006 + scrollStartWaveOffset) * 12);
                for (let x = viewWidth - 1; x >= 0; x--) gCtx.lineTo(x, (window.scrollY + window.innerHeight - viewHeight) + currentWaveY[x]);
                gCtx.fill(); gCtx.restore();
            }

            sCtx.fillStyle = "rgba(58, 131, 204, 0.30)";
            sCtx.beginPath(); sCtx.moveTo(0, viewHeight);
            for (let x = 0; x < viewWidth; x++) sCtx.lineTo(x, currentWaveY[x]);
            sCtx.lineTo(viewWidth, viewHeight); sCtx.fill();
            requestAnimationFrame(renderLoop);
        }
        requestAnimationFrame(renderLoop);
    });
</script>
</body>
</html>
